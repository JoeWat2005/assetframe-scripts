name: ci

on: [push, pull_request]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run engine test suite
        timeout-minutes: 8
        run: |
          fail=0
          for t in scripts/test_*.py; do
            echo "=== $t ==="
            # Hard per-test cap: a hung test fails fast (rc 124) instead of stalling the job.
            timeout 120 python "$t" || { echo "::error::$t failed or timed out (rc=$?)"; fail=1; }
          done
          exit $fail

  # Continuous deploy to the OCI engine box via a self-hosted runner (label: assetframe), which
  # keeps the VM inbound-portless: the runner dials out to GitHub, no SSH port is exposed. Runs
  # ONLY after the tests pass and ONLY when the repo variable DEPLOY_ENABLED=true.
  #
  # Two environments from ONE repo — each branch deploys to its own folder + service and restarts:
  #   push to main         -> /opt/assetframe-scripts       (assetframe-poller.service)      [PROD]
  #   push to development  -> /opt/assetframe-scripts-dev   (assetframe-poller-dev.service)  [DEV]
  # The dev folder is updated only if it exists (stand it up via deploy/README.md §Dev worker).
  deploy:
    needs: python-tests
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development') &&
      vars.DEPLOY_ENABLED == 'true'
    runs-on: [self-hosted, assetframe]
    concurrency:
      group: assetframe-deploy-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Update and restart the engine
        env:
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # update <dir> <service> <branch> — fast-forward a checkout to its branch and restart.
          update() {
            echo "::group::deploy $1 ($3)"
            cd "$1"
            # The box pushes its own ledger commits to origin, so origin is the source of truth.
            # --ff-only refuses (rather than destroys) if the tree ever diverged.
            git fetch --prune origin
            git checkout "$3"
            git pull --ff-only origin "$3"
            .venv/bin/pip install -r requirements.txt --quiet
            npm install --omit=dev --no-audit --no-fund
            sudo systemctl restart "$2"
            sleep 2
            systemctl is-active "$2"
            echo "::endgroup::"
          }
          if [ "$REF" = "main" ]; then
            # PROD: main -> the prod checkout + poller.
            update /opt/assetframe-scripts assetframe-poller.service main
          elif [ "$REF" = "development" ]; then
            # DEV: development -> the dev checkout + poller (only if it's been stood up).
            if [ -d /opt/assetframe-scripts-dev ]; then
              update /opt/assetframe-scripts-dev assetframe-poller-dev.service development
            else
              echo "dev checkout /opt/assetframe-scripts-dev not present yet — skipping (see deploy/README.md §Dev worker)"
            fi
          fi
